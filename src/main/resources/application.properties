spring.application.name=TaskForge

# ===============================
# Server
# ===============================
server.port=8080

# ===============================
# Database (PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/taskforge
spring.datasource.username=postgres
spring.datasource.password=1234

spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# JWT Configuration
# ===============================
jwt.secret=EyqyWCOggbE2yLsHjFj9o5r+UAASuNJNbqIIUOImIcI=
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# ===============================
# Redis
# ===============================
# Connection Settings
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0

# Connection Pool (using Lettuce by default in Spring Boot)
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.pool.max-wait=-1ms

# Cache Settings (if using @Cacheable)
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000ms
spring.cache.redis.cache-null-values=false

# ===============================
# Logging (optional but useful)
# ===============================
logging.level.org.springframework.security=DEBUG
